
name: Deploy to EKS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 274193347344.dkr.ecr.ap-south-1.amazonaws.com

      - name: Build Docker image
        run: docker build -t frontend-app .

      - name: Tag image
        run: docker tag frontend-app:latest 274193347344.dkr.ecr.ap-south-1.amazonaws.com/frontend-app:latest

      - name: Push image
        run: docker push 274193347344.dkr.ecr.ap-south-1.amazonaws.com/frontend-app:latest

      - name: Deploy to EKS
        run: |
          aws eks update-kubeconfig --region ap-south-1 --name your-my-eks-cluster
          kubectl apply -f k8s/
